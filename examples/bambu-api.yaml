x-protocols:
  mqtt:
    description: Bambu Lab printers communicate via MQTT for real-time status, commands, and telemetry
    topics:
      device/{deviceId}/report: Device status reports (temperature, print progress, AMS filament)
      device/{deviceId}/request: Commands sent to printer
    commands:
      app_cert_list: List application certificates for device auth
      extrusion_cali_sel: Select filament for extrusion calibration
    auth: RSA_SHA256 signed payloads with device certificates
